    <script>
      /* Capture uncaught JS errors + promise rejections and log them to Supabase (capped, de-duplicated) */
      (function () {
        const supabaseUrl = "https://izsggdtdiacxdsjjncdq.supabase.co";
        const supabaseKey =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6c2dnZHRkaWFjeGRzampuY2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg1OTEzNjUsImV4cCI6MjA1NDE2NzM2NX0.FVKBJG-TmXiiYzBDjGIRBM2zg-DYxzNP--WM6q2UMt0";
        let errorClient = null;
        if (window.supabase) {
          errorClient = window.supabase.createClient(supabaseUrl, supabaseKey);
          window._mscSupabaseClient = errorClient;
        }
        const MAX_ERRORS = 10;
        let errorCount = 0;
        const reportedErrors = new Set();
        async function logFrontendError(errorData) {
          if (errorCount >= MAX_ERRORS || !errorClient) return;
          const hash = `${errorData.error_message}|${errorData.source_file}|${errorData.line_number}`;
          if (reportedErrors.has(hash)) return;
          reportedErrors.add(hash);
          errorCount++;
          try {
            let userId = null;
            try {
              const {
                data: { session },
              } = await errorClient.auth.getSession();
              userId = session?.user?.id || null;
            } catch (e) {}
            await errorClient
              .from("frontend_errors")
              .insert({
                user_id: userId,
                error_message: errorData.error_message || "Unknown Error",
                stack_trace:
                  errorData.stack_trace ||
                  `${errorData.source_file}:${errorData.line_number}`,
                url: window.location.href,
                user_agent: navigator.userAgent,
              });
          } catch (e) {}
        }
        window.onerror = function (message, source, lineno, colno, error) {
          logFrontendError({
            error_message: message,
            source_file: source,
            line_number: lineno,
            stack_trace: error ? error.stack : null,
          });
          return false;
        };
        window.addEventListener("unhandledrejection", function (event) {
          const msg = event.reason
            ? event.reason.message || event.reason.toString()
            : "Unhandled Promise Rejection";
          logFrontendError({
            error_message: msg,
            source_file: "Promise/Async",
            stack_trace: event.reason?.stack || "",
          });
        });
      })();
    </script>
