<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications - My Student Club</title>
  <meta name="description"
    content="Track all your job applications across Industrial Training, Articleship, and CA jobs at My Student Club.">
  <meta name="keywords" content="job applications, application history, CA jobs tracker">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="scripts/portal-style.css">
  <link rel="stylesheet" href="/scripts/history-style.css?v=2">
  <link rel="icon" type="image/x-icon" href="/assets/icon-70x70.png">
  <link rel="canonical" href="https://www.mystudentclub.com/history.html" />
  <meta name="robots" content="noindex, follow">
  <script src="scripts/vendor/supabase.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-messaging-compat.js"></script>
</head>

<body>

  <header class="site-header">
    <div class="header-container">
      <div class="brand-wrapper" style="display: flex; align-items: center;">
        <a href="/" class="brand-link">
          <img src="/assets/logo.png" alt="My Student Club" class="brand-logo">
        </a>
        <div class="page-header-inline">
          <h1 class="inline-title">My Applications</h1>
          <span class="inline-count" id="applicationCount">0</span>
        </div>
      </div>
      <div class="nav-actions">
        <div class="auth-buttons-container"></div>
        <button class="icon-button menu-toggle-btn" id="menuButton" aria-label="Open menu">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="expanded-menu" id="expandedMenu">
    <button class="icon-button menu-close-btn" id="menuCloseBtn" aria-label="Close menu">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <div class="menu-items-container">
      <a href="/learning-management-system/" class="menu-item" id="lms-nav-link" style="display: none;">My Courses</a>
      <a href="/history.html" class="menu-item active" id="history-nav-link">My Applications</a>

      <a href="/ca-industrial-training-program/" class="menu-item">MSC Industrial Training Program</a>
      <a href="/articleship-program/" class="menu-item">MSC Articleship Program</a>
      <a href="/msc-ca-fresher-program/" class="menu-item">MSC CA Freshers Program</a>

      <div class="menu-item-dropdown">
        <button class="menu-item" id="resourcesDropdownBtn">
          Free Resources
          <svg class="dropdown-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <div class="dropdown-content" id="resourcesDropdown">
          <a href="/ca-fresher-training-resources.html" class="dropdown-item">CA Fresher</a>
          <a href="/ca-industrial-training-resources.html" class="dropdown-item">Industrial Training</a>
          <a href="/ca-articleship-opportunities" class="dropdown-item">Articleship</a>
        </div>
      </div>



      <a href="/contact.html" class="menu-item">Contact Us</a>
    </div>
  </div>

  <div id="notificationPopup" class="notification-popup">
    <div class="notification-popup-header">
      <h3>Notification Preferences</h3>
      <button id="closeNotificationPopup" class="icon-button">×</button>
    </div>
    <div class="notification-status" id="notificationStatus"></div>
    <div id="notification-permission-status"></div>
    <button id="enable-notifications-btn" class="action-button">Enable Notifications</button>

    <div id="topic-selection-area">
      <div class="all-topic-section">
        <label>
          <input type="checkbox" id="topic-all">
          <span>Receive All Job Notifications</span>
        </label>
      </div>
      <div class="subscription-form" id="specific-subscription-form">
        <h4>Add Specific Subscription:</h4>
        <div class="subscription-selectors">
          <select id="locationSelect" class="filter-control"></select>
          <select id="jobTypeSelect" class="filter-control"></select>
          <button id="subscribeBtn" class="action-button" disabled>Subscribe</button>
        </div>
      </div>
      <div class="subscribed-topics">
        <h4>Your Subscriptions:</h4>
        <div id="subscribedTopicsList"></div>
      </div>
    </div>
  </div>

  <main class="main-content-area">
    <!-- Portal Tabs like index page -->
    <nav class="portal-nav-bar" id="portalFilters">
      <button class="footer-tab active" data-portal="all" type="button">
        <svg class="tab-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="stroke-width: 1.8;"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
        <span class="desktop-tab-label">All Jobs</span>
        <span class="mobile-tab-label">All</span>
        <span class="pill-count" data-count="all">0</span>
      </button>
      <button class="footer-tab" data-portal="Industrial Training Job Portal" type="button">
        <svg class="tab-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="stroke-width: 1.8;"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <span class="desktop-tab-label">Industrial Training</span>
        <span class="mobile-tab-label">Industrial</span>
        <span class="pill-count" data-count="Industrial Training Job Portal">0</span>
      </button>
      <button class="footer-tab" data-portal="Articleship Jobs" type="button">
        <svg class="tab-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="stroke-width: 1.8;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span class="desktop-tab-label">Articleship</span>
        <span class="mobile-tab-label">Articleship</span>
        <span class="pill-count" data-count="Articleship Jobs">0</span>
      </button>
      <button class="footer-tab" data-portal="Semi Qualified Jobs" type="button">
        <svg class="tab-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="stroke-width: 1.8;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
        <span class="desktop-tab-label">Semi Qualified</span>
        <span class="mobile-tab-label">Semi Qualified</span>
        <span class="pill-count" data-count="Semi Qualified Jobs">0</span>
      </button>
      <button class="footer-tab" data-portal="Fresher Jobs" type="button">
        <svg class="tab-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="stroke-width: 1.8;"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
        <span class="desktop-tab-label">CA Freshers</span>
        <span class="mobile-tab-label">CA Freshers</span>
        <span class="pill-count" data-count="Fresher Jobs">0</span>
      </button>
      <button class="footer-tab" data-portal="Experienced CA Jobs" type="button">
        <svg class="tab-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="stroke-width: 1.8;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        <span class="desktop-tab-label">Experienced CA</span>
        <span class="mobile-tab-label">Experienced CA</span>
        <span class="pill-count" data-count="Experienced CA Jobs">0</span>
      </button>
    </nav>

    <div class="job-portal-layout">
      <!-- Mobile Controls (Visible only on mobile) -->
      <div class="mobile-controls">
        <div class="search-bar-wrapper">
          <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input type="text" id="mobileSearchInput" placeholder="Search applications..." class="search-input-field">
        </div>
        <button id="mobileFilterToggle" class="filter-toggle-btn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L12 14.414V19a1 1 0 01-1.447.894l-2-1A1 1 0 018 18v-3.586L3.293 6.707A1 1 0 013 6V4z" />
          </svg>
          <span>Filters</span>
        </button>
      </div>

      <!-- Left Sidebar Filters -->
      <aside class="filter-sidebar" id="filterSidebar">
        <div class="filter-sidebar-header">
          <h3>Filters</h3>
          <div style="display: flex; gap: 1rem; align-items: center;">
            <button class="reset-filters-btn" id="resetFiltersBtn"
              style="background:none; border:none; color:var(--primary-brand); font-size:0.85rem; cursor:pointer; font-weight:500;">Reset</button>
            <button id="closeSidebarBtn" class="close-sidebar-btn" aria-label="Close filters">×</button>
          </div>
        </div>
        <div class="filter-group mobile-only-filter">
          <label for="portalSelectMobile">Jobs Portal</label>
          <select id="portalSelectMobile" class="filter-control">
            <option value="all">All Jobs</option>
            <option value="Industrial Training Job Portal">Industrial Training</option>
            <option value="Articleship Jobs">Articleship</option>
            <option value="Semi Qualified Jobs">Semi Qualified</option>
            <option value="Fresher Jobs">CA Freshers</option>
            <option value="Experienced CA Jobs">Experienced CA</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="searchInput">Keyword</label>
          <div class="search-bar-wrapper">
            <i class="fas fa-search search-button"></i>
            <input type="text" id="searchInput" placeholder="Search by company..." class="search-input-field">
          </div>
        </div>
        <div class="filter-group">
          <label for="sortBySelect">Sort by</label>
          <select id="sortBySelect" class="filter-control">
            <option value="newest">Latest Applied</option>
            <option value="oldest">Oldest Applied</option>
            <option value="company_asc">Company A-Z</option>
            <option value="company_desc">Company Z-A</option>
          </select>
        </div>
      </aside>

      <!-- Right Content Area -->
      <section class="job-listings-area">
        <!-- Applied / Saved Toggle -->
        <div class="view-mode-toggle" id="viewModeToggle">
          <button class="view-mode-btn active" id="appliedToggleBtn" data-mode="applied">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15" style="margin-right: 0.25rem;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Applied
            <span class="vmt-count" id="vmtAppliedCount">0</span>
          </button>
          <button class="view-mode-btn" id="savedToggleBtn" data-mode="saved">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15" style="margin-right: 0.25rem;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
            </svg>
            Saved
            <span class="vmt-count" id="vmtSavedCount">0</span>
          </button>
        </div>

        <div class="history-content" id="historyContent">
          <div class="loader-container" id="loader">
            <div class="loader-spinner"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Job Details Modal (Styled as right side drawer) -->
  <div id="modal" class="modal-overlay-container">
    <div class="modal-drawer">
      <button class="modal-close-action" id="modalCloseBtn" aria-label="Close details">×</button>
      <div id="modal-body-content" class="drawer-body-scroll"></div>
    </div>
  </div>

  <script type="module" src="/scripts/history.js"></script>
  <script type="module" src="/scripts/date-utils.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1450NCVE65"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-1450NCVE65');
  </script>
</body>

</html>
