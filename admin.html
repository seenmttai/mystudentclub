<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - My Student Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://www.mystudentclub.com/scripts/style.css">
  <link rel="stylesheet" href="https://www.mystudentclub.com/scripts/admin-styles.css">
  <link rel="icon" type="image/x-icon" href="https://www.mystudentclub.com/assets/icon-70x70.png">
  <style>
    .admin-header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
      position: relative;
      flex-shrink: 0;
    }

    .export-menu-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .profile-export-trigger {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      border-radius: 8px;
      min-height: 44px;
      padding: 0.5rem 0.75rem 0.5rem 0.65rem;
      gap: 0.6rem;
      font-weight: 500;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .profile-export-trigger:hover {
      border-color: rgba(79, 70, 229, 0.35);
      box-shadow: var(--shadow-md);
      background: var(--surface);
    }

    .profile-export-trigger:focus-visible {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .profile-export-trigger[aria-expanded="true"] {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .profile-export-trigger__icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 6px;
      background: rgba(79, 70, 229, 0.08);
      color: var(--primary);
      flex-shrink: 0;
    }

    .profile-export-trigger__icon-wrap svg {
      width: 1.1rem;
      height: 1.1rem;
    }

    .profile-export-trigger__text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      line-height: 1.2;
      gap: 0.1rem;
    }

    .profile-export-trigger__label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .profile-export-trigger__hint {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .profile-export-trigger__chevron {
      width: 1.1rem;
      height: 1.1rem;
      margin-left: 0.15rem;
      color: var(--text-secondary);
      flex-shrink: 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .profile-export-trigger[aria-expanded="true"] .profile-export-trigger__chevron {
      transform: rotate(180deg);
      color: var(--primary);
    }

    .export-menu-panel {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      width: 400px;
      max-width: min(400px, calc(100vw - 2rem));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      padding: 0;
      display: none;
      z-index: 40;
      overflow: hidden;
    }

    .export-menu-panel.open {
      display: block;
      animation: export-panel-in 0.18s ease-out;
    }

    @keyframes export-panel-in {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .export-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .export-panel-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .export-panel-close:hover {
      background: var(--background);
      color: var(--text-primary);
    }

    .export-panel-close:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.25);
    }

    .export-panel-close svg {
      width: 1.15rem;
      height: 1.15rem;
    }

    .export-panel-body {
      padding: 1rem;
    }

    .export-panel-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 0.2rem;
    }

    .export-panel-subtitle {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin: 0;
      line-height: 1.5;
      max-width: 42ch;
    }

    .export-filter-grid {
      display: grid;
      gap: 1rem;
    }

    .export-filter-group {
      display: grid;
      gap: 0.5rem;
    }

    .export-filter-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .export-filter-label svg {
      width: 0.95rem;
      height: 0.95rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .export-filter-label--compact {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .export-mode-fieldset {
      border: none;
      margin: 0;
      padding: 0;
      min-width: 0;
    }

    .export-mode-fieldset legend {
      padding: 0;
      margin: 0 0 0.45rem;
    }

    .export-mode-segment-wrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.35rem;
      padding: 0.3rem;
      background: var(--background);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .export-mode-chip {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.25;
      color: var(--text-secondary);
      padding: 0.5rem 0.35rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
    }

    @media (min-width: 420px) {
      .export-mode-chip {
        font-size: 0.75rem;
        padding: 0.55rem 0.4rem;
      }
    }

    .export-mode-chip:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.7);
    }

    .export-mode-chip input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      margin: 0;
    }

    .export-mode-chip:has(input:focus-visible) {
      outline: 2px solid var(--primary);
      outline-offset: 1px;
    }

    .export-mode-chip:has(input:checked) {
      background: var(--primary);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .export-date-card {
      display: grid;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .export-date-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-primary);
      padding: 0.5rem 0.65rem;
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .export-date-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .export-filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .export-filter-field {
      display: none;
    }

    .export-filter-field.active {
      display: grid;
      gap: 0.5rem;
    }

    .export-panel-actions {
      display: flex;
      align-items: stretch;
      gap: 0.6rem;
      margin-top: 0.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .export-panel-reset {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      min-height: 44px;
      min-width: 5.5rem;
      border-radius: 8px;
      box-shadow: none;
      font-weight: 500;
    }

    .export-panel-reset:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
      background: var(--background);
    }

    .export-panel-actions .save-btn {
      flex: 1;
      min-height: 44px;
      border-radius: 8px;
      justify-content: center;
    }

    .profile-export-download-btn svg {
      width: 1.125rem;
      height: 1.125rem;
      flex-shrink: 0;
    }

    .export-panel-status {
      display: block;
      margin-top: 0.75rem;
      min-height: 1.25rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .export-panel-status.error {
      color: var(--danger);
    }

    .admin-badge {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 1rem;
      border-radius: 12px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .admin-header {
        padding: 1rem 1.1rem;
        gap: 1rem;
      }

      .admin-header-actions {
        width: 100%;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .export-menu-panel {
        right: 0;
        left: auto;
        width: min(388px, calc(100vw - 2rem));
      }

      .export-filter-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .admin-header {
        flex-direction: column;
        align-items: stretch;
      }

      .admin-header-actions {
        justify-content: space-between;
      }

      .profile-export-trigger {
        min-height: 48px;
      }

      .admin-badge {
        min-height: 48px;
      }

      .export-menu-panel {
        top: calc(100% + 0.45rem);
        width: calc(100vw - 2rem);
      }

      .export-mode-segment-wrap {
        grid-template-columns: 1fr;
      }

      .export-panel-actions {
        flex-direction: column-reverse;
        align-items: stretch;
      }

      .export-panel-reset,
      .export-panel-actions .save-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="access-denied" class="access-denied" style="display: none;">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <h1 class="text-2xl font-bold">Access Denied</h1>
    <p class="text-gray-600">You don't have permission to access this page.</p>
    <a href="/" class="admin-btn save-btn">Back to Home</a>
  </div>

  <div id="admin-content" style="display: none;">
    <header class="admin-header">
      <h1>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
        Admin Panel
      </h1>
      <div class="admin-header-actions">
        <div class="export-menu-wrap">
          <button id="downloadProfilesBtn" class="admin-btn profile-export-trigger" type="button" aria-expanded="false" aria-controls="profileExportPanel" aria-haspopup="dialog">
            <span class="profile-export-trigger__icon-wrap" aria-hidden="true">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </span>
            <span class="profile-export-trigger__text">
              <span class="profile-export-trigger__label">Profiles</span>
              <span class="profile-export-trigger__hint">Export as CSV</span>
            </span>
            <svg class="profile-export-trigger__chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <div id="profileExportPanel" class="export-menu-panel" role="dialog" aria-label="Profile export options">
            <div class="export-panel-header">
              <div>
                <h2 class="export-panel-title">Export profiles</h2>
                <p class="export-panel-subtitle">Pick a scope, then download a CSV. Dates use your local calendar.</p>
              </div>
              <button type="button" id="profileExportCloseBtn" class="export-panel-close" aria-label="Close export panel">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <div class="export-panel-body">
              <div class="export-filter-grid">
                <fieldset class="export-mode-fieldset">
                  <legend id="profileExportModeLegend" class="export-filter-label">Report type</legend>
                  <div class="export-mode-segment-wrap" role="radiogroup" aria-labelledby="profileExportModeLegend">
                    <label class="export-mode-chip">
                      <input type="radio" name="profileExportMode" value="all" checked>
                      <span>All profiles</span>
                    </label>
                    <label class="export-mode-chip">
                      <input type="radio" name="profileExportMode" value="day">
                      <span>Single day</span>
                    </label>
                    <label class="export-mode-chip">
                      <input type="radio" name="profileExportMode" value="range">
                      <span>Date range</span>
                    </label>
                  </div>
                </fieldset>

                <div id="profileExportDayField" class="export-filter-field">
                  <div class="export-date-card">
                    <label class="export-filter-label" for="profileExportDay">
                      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                      </svg>
                      Day to export
                    </label>
                    <input id="profileExportDay" class="export-date-input" type="date" autocomplete="off">
                  </div>
                </div>

                <div id="profileExportRangeField" class="export-filter-field">
                  <div class="export-date-card">
                    <span class="export-filter-label" id="profileExportRangeLabel">
                      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                      </svg>
                      Date range
                    </span>
                    <div class="export-filter-row" role="group" aria-labelledby="profileExportRangeLabel">
                      <div class="export-filter-group">
                        <label class="export-filter-label export-filter-label--compact" for="profileExportStartDate">Start</label>
                        <input id="profileExportStartDate" class="export-date-input" type="date" autocomplete="off">
                      </div>
                      <div class="export-filter-group">
                        <label class="export-filter-label export-filter-label--compact" for="profileExportEndDate">End</label>
                        <input id="profileExportEndDate" class="export-date-input" type="date" autocomplete="off">
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="export-panel-actions">
                <button id="profileExportResetBtn" class="admin-btn export-panel-reset" type="button">Reset</button>
                <button id="profileExportConfirmBtn" class="admin-btn save-btn profile-export-download-btn" type="button">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                  </svg>
                  Download CSV
                </button>
              </div>

              <span id="profileExportStatus" class="export-panel-status" aria-live="polite"></span>
            </div>
          </div>
        </div>
        <span class="admin-badge">Super Admin</span>
      </div>
    </header>

    <main>
      <section class="admin-controls">
        <h2>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          Banner Management
        </h2>
        <div class="banner-editor" id="banner-editor"></div>
        <div class="add-button-container">
          <button class="icon-btn add-icon-btn" onclick="addNewBanner()" title="Add New Banner">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
          </button>
        </div>
      </section>

      <section class="admin-controls">
        <h2>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Course Banner Management
        </h2>
        <div class="banner-editor" id="course-banner-editor"></div>
        <div class="add-button-container">
          <button class="icon-btn add-icon-btn" onclick="addNewCourseBanner()" title="Add New Course Banner">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
          </button>
        </div>
      </section>

      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search keywords" class="search-input">
      </div>

      <div class="filter-container">
        <input type="text" id="locationSearchInput" placeholder="Search Location" class="filter-input">
        <select id="salaryFilter" class="filter-select">
          <option value="">Any Stipend</option>
          <option value="10000-20000">₹10,000 - ₹20,000</option>
          <option value="20000-40000">₹20,000 - ₹40,000</option>
          <option value="40000+">₹40,000+</option>
        </select>
        <div id="experienceFilterContainer" style="display: none;">
          <select id="experienceFilter" class="filter-select">
            <option value="">All Experience</option>
            <option value="Freshers">Freshers</option>
            <option value="Experienced">Experienced</option>
            <option value="null">Not Specified</option>
          </select>
        </div>
      </div>

      <div class="admin-controls">
        <h2>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          Job Management
        </h2>
        <div class="add-button-container">
          <button class="icon-btn add-icon-btn" onclick="showAddJobModal()" title="Add New Job">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
          </button>
        </div>
      </div>

      <div id="jobs" class="job-grid"></div>
      <div class="loader" id="loader" style="display: none;">
        <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
      </div>
      <div class="load-more-container">
        <button id="loadMore" class="load-more-btn" style="display: none;">Load More Jobs</button>
      </div>
    </main>

    <div id="modal" class="modal-overlay" onclick="closeModal(event)">
      <div class="modal">
        <button class="modal-close" onclick="closeModal(event)">✕</button>
        <div id="modal-content"></div>
      </div>
    </div>

    <div id="job-edit-modal" class="modal-overlay" style="display: none;">
      <div class="job-edit-modal">
        <div class="modal-header">
          <h2 class="text-xl font-bold" id="job-edit-title">Add New Job</h2>
          <button class="modal-close" onclick="closeJobEditModal()">✕</button>
        </div>
        <div class="modal-inner">
          <form id="job-form" class="job-form">

    async function triggerNotifications(jobData, accessToken) { if (!jobData || !accessToken) return; const { Company = 'A Company', Location = 'Various Locations', Description = '', table = currentTable } = jobData; const portalName = PORTAL_NAME_MAP[table] || 'Job'; const jobType = JOB_TYPE_MAP[table]; const link = PORTAL_LINK_MAP[table] || 'https://www.mystudentclub.com/'; const notificationTitle = `New ${portalName} job in ${Location}: ${Company}`; const notificationBody = truncateDescription(Description); const matchedLocationKeyword = findMatchingLocationKeyword(Location); const specificTopic = generateTopicName(matchedLocationKeyword, jobType); if (specificTopic) { await sendNotification(specificTopic, notificationTitle, notificationBody, link, accessToken); } await sendNotification('all', notificationTitle, notificationBody, link, accessToken); }

    function buildDateBoundsForLocalDay(dateString) {
      const start = new Date(`${dateString}T00:00:00`);
      const end = new Date(`${dateString}T23:59:59.999`);
      return { startIso: start.toISOString(), endIso: end.toISOString() };

    function getProfileExportFilters() {

      if (mode === 'all') {

      if (mode === 'day') {

    function escapeCsvValue(value) {
      const stringValue = value == null ? '' : String(value);
      return `"${stringValue.replace(/"/g, '""')}"`;

    function humanizeFieldLabel(key) {
      return key

    function downloadCsv(filename, columns, rows) {
      const csvLines = [columns.map((column) => escapeCsvValue(column.label)).join(',')];
      rows.forEach((row) => {
        csvLines.push(columns.map((column) => escapeCsvValue(row[column.key] ?? '')).join(','));
      });
      const blob = new Blob([csvLines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
    function prettifyProfileValue(key, value) {
      if (value == null) return '';
      if (Array.isArray(value)) {
        return value.map((entry) => prettifyProfileValue(key, entry)).join(' | ');
      }
      if (typeof value === 'object') {
        try {
          return JSON.stringify(value);
        } catch (error) {
          return String(value);
        }
      }
      if (typeof value !== 'string') return String(value);

      const trimmed = value.trim();
      if (!trimmed) return '';

      if ((key === 'certifications_json' || key === 'projects_json' || key === 'notification_subscriptions') &&
          (trimmed.startsWith('[') || trimmed.startsWith('{'))) {
        try {
          const parsed = JSON.parse(trimmed);
          if (Array.isArray(parsed)) {
            return parsed.map((entry) => {
              if (entry && typeof entry === 'object') {
                return Object.values(entry).filter(Boolean).join(' - ');
              }
              return String(entry);
            }).join(' | ');
          }
          if (parsed && typeof parsed === 'object') {
            return Object.entries(parsed)
              .map(([subKey, subValue]) => `${subKey}: ${subValue}`)
              .join(' | ');
          }
        } catch (error) {
          return trimmed;
        }
      }

      if (key === 'languages_json' && trimmed.startsWith('[')) {
        try {
          const parsed = JSON.parse(trimmed);
          if (Array.isArray(parsed)) {
            return parsed.map((entry) => {
              if (!entry || typeof entry !== 'object') return String(entry);
              const language = entry.language || entry.name || '';
              const proficiency = entry.proficiency || entry.level || '';
              return [language, proficiency].filter(Boolean).join(' - ');
            }).join(' | ');
          }
        } catch (error) {
          return trimmed;
        }
      }

      return trimmed;
    }
    function joinNonEmpty(parts, separator = ' | ') {
      return parts.map((part) => (part == null ? '' : String(part).trim())).filter(Boolean).join(separator);
    }
    function formatDateForExport(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).trim();
      return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    function parseJsonArrayString(value) {
      if (!value || typeof value !== 'string') return null;
      const trimmed = value.trim();
      if (!trimmed.startsWith('[') && !trimmed.startsWith('{')) return null;
      try {
        return JSON.parse(trimmed);
      } catch (error) {
        return null;
      }
    }
    function formatDateTimeForExport(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).trim();
      return date.toLocaleString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    function formatLanguages(value) {
      if (!value) return '';
      const parsed = parseJsonArrayString(value);
      if (Array.isArray(parsed)) {
        return parsed.map((entry) => joinNonEmpty([entry?.language || entry?.name, entry?.proficiency || entry?.level], ' - ')).filter(Boolean).join(', ');
      }
      return String(value)
        .split(',')
        .map((entry) => entry.trim())
        .filter(Boolean)
        .map((entry) => {
          const parts = entry.split('|').map((part) => part.trim()).filter(Boolean);
          return joinNonEmpty([parts[0], parts[1]], ' - ');
        })
        .filter(Boolean)
        .join(', ');
    }
    function formatCertificationSummary(profile) {

        return jsonCerts.map((entry) => joinNonEmpty([entry?.cert_name, entry?.cert_issuer, entry?.cert_year], ' - ')).filter(Boolean).join(' | ');
      }
      return joinNonEmpty([profile.cert_name, profile.cert_issuer, profile.cert_year], ' - ');
    }
    function formatProjectSummary(profile) {
      const jsonProjects = parseJsonArrayString(profile.projects_json);
      if (Array.isArray(jsonProjects) && jsonProjects.length) {
        return jsonProjects.map((entry) => joinNonEmpty([entry?.project_title || entry?.title, entry?.project_tag || entry?.tag, entry?.project_status || entry?.status], ' - ')).filter(Boolean).join(' | ');
      }
      return joinNonEmpty([
        profile.project_title,
        profile.project_tag,
        profile.project_status,
        profile.project_client && `Client: ${profile.project_client}`,
        profile.project_details
      ]);
    }
    function formatCaTrack(profile) {
      const sections = [
        joinNonEmpty([profile.ca_final_course, profile.ca_final_attempts && `Attempts: ${profile.ca_final_attempts}`, joinNonEmpty([profile.ca_final_clear_month, profile.ca_final_clear_year], ' ')]),
        joinNonEmpty([profile.ca_inter_course, profile.ca_inter_attempts && `Attempts: ${profile.ca_inter_attempts}`, joinNonEmpty([profile.ca_inter_clear_month, profile.ca_inter_clear_year], ' ')]),
        joinNonEmpty([profile.ca_found_course, profile.ca_found_attempts && `Attempts: ${profile.ca_found_attempts}`, joinNonEmpty([profile.ca_found_clear_month, profile.ca_found_clear_year], ' ')])
      ].filter(Boolean);
      return sections.join(' | ') || profile.ca_level || '';
    }
    function formatArticleshipDetails(profile) {
      return joinNonEmpty([
        profile.articleship_firm_type,
        profile.articleship_firm_name,
        profile.articleship_domain === 'Other' ? profile.articleship_domain_other : profile.articleship_domain,
        profile.articleship_completion_date && `Completion: ${formatDateForExport(profile.articleship_completion_date)}`
      ]);
    }
    function formatEducationLine(label, parts) {
      const value = joinNonEmpty(parts, ' - ');
      return value ? `${label}: ${value}` : '';
    }
    function getExportFieldValue(row, profile, key) {
      if (key === 'uuid') return prettifyProfileValue(key, row.uuid);
      if (key === 'updated_at') return formatDateTimeForExport(row.updated_at);
      if (key === 'ocr_cv') return prettifyProfileValue(key, row.ocr_cv).replace(/\s+/g, ' ').trim();
      if (key === 'languages_json') return formatLanguages(profile.languages_json);
      if (key === 'certifications_json') return formatCertificationSummary(profile);
      if (key === 'projects_json') return formatProjectSummary(profile);
      if (key === 'profile_summary') return prettifyProfileValue(key, profile.profile_summary || profile.headline);
      if (key === 'emp_skills_hidden') {
        return prettifyProfileValue(key, profile.emp_skills_hidden)
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean)
          .join(', ');
      }
      return prettifyProfileValue(key, profile[key]);
    }
    function normalizeProfileObject(profile) {
      if (!profile) return {};
      if (typeof profile === 'object') return profile;
      if (typeof profile === 'string') {
        try {
          const parsed = JSON.parse(profile);
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (error) {
          return {};
        }
      }
      return {};
    }
    function flattenProfileRow(row) {
      const profile = normalizeProfileObject(row.profile);
      const exportRow = {};
      PROFILE_EXPORT_COLUMNS.forEach((column) => {
        exportRow[column.key] = getExportFieldValue(row, profile, column.key);
      });
      return exportRow;
    }
    async function fetchAllProfilesForExport(filters) {
      const rows = [];
      let from = 0;

      while (true) {
        const to = from + PROFILE_EXPORT_BATCH_SIZE - 1;
        let query = supabaseClient
          .from('profiles')
          .select('uuid, profile, updated_at')
          .order('updated_at', { ascending: false, nullsFirst: false });

        if (filters?.startIso && filters?.endIso) {
          query = query.gte('updated_at', filters.startIso).lte('updated_at', filters.endIso);
        }

        const { data, error } = await query.range(from, to);

        if (error) throw error;
        if (!data || data.length === 0) break;

        rows.push(...data);
        if (data.length < PROFILE_EXPORT_BATCH_SIZE) break;
        from += PROFILE_EXPORT_BATCH_SIZE;
      }

      return rows;
    }
    async function exportProfilesCsv(button) {
      if (button) button.disabled = true;
      setProfileExportStatus('Preparing export...');
      try {
        const filters = getProfileExportFilters();
        const rows = await fetchAllProfilesForExport(filters);
        const flattenedRows = rows.map(flattenProfileRow);
        const today = new Date().toISOString().slice(0, 10);
        const fileSuffix = filters?.filenameSuffix || today;
        downloadCsv(`profiles_export_${fileSuffix}_${today}.csv`, PROFILE_EXPORT_COLUMNS, flattenedRows);
        setProfileExportStatus(`Exported ${flattenedRows.length} profiles.`);
        toggleProfileExportPanel(false);
      } catch (error) {
        console.error('Profile export failed:', error);
        setProfileExportStatus(`Export failed: ${error.message}`, true);
      } finally {
        if (button) button.disabled = false;
      }
    }
    async function loadBanners() { const { data: banners, error } = await supabaseClient.from('Banners').select('*'); if (error) throw error; const bannerEditor = document.getElementById('banner-editor'); bannerEditor.innerHTML = ''; banners.forEach(banner => { const bannerItem = document.createElement('div'); bannerItem.className = 'banner-item'; bannerItem.innerHTML = ` <input type="text" class="admin-input" value="${banner.Image || ''}" placeholder="Image URL"> <input type="text" class="admin-input" value="${banner.Hyperlink || ''}" placeholder="Hyperlink"> <select class="admin-input type-select"> <option value="Industrial" ${banner.Type === 'Industrial' ? 'selected' : ''}>Industrial</option> <option value="Freshers" ${banner.Type === 'Freshers' ? 'selected' : ''}>Freshers</option> <option value="Articleship" ${banner.Type === 'Articleship' ? 'selected' : ''}>Articleship</option> <option value="Semi-Qualified" ${banner.Type === 'Semi-Qualified' ? 'selected' : ''}>Semi-Qualified</option> <option value="All" ${banner.Type === 'All' ? 'selected' : ''}>All</option> </select> <div class="banner-actions"> <button class="icon-btn edit-icon-btn" title="Save Banner"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button> <button class="icon-btn delete-icon-btn" title="Delete Banner"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button> </div>`; const [editBtn, deleteBtn] = bannerItem.querySelectorAll('button'); editBtn.addEventListener('click', () => updateBanner(banner.id, bannerItem)); deleteBtn.addEventListener('click', () => deleteBanner(banner.id)); bannerEditor.appendChild(bannerItem); }); }
    async function updateBanner(id, itemElement) { const [imageInput, hyperlinkInput, typeSelect] = itemElement.querySelectorAll('.admin-input, .type-select'); try { const { error } = await supabaseClient.from('Banners').update({ Image: imageInput.value, Hyperlink: hyperlinkInput.value, Type: typeSelect.value }).eq('id', id); if (error) throw error; alert('Banner updated successfully'); } catch (error) { alert('Failed to update banner: ' + error.message); } }
    async function deleteBanner(id) { if (!confirm('Are you sure you want to delete this banner?')) return; try { const { error } = await supabaseClient.from('Banners').delete().eq('id', id); if (error) throw error; await loadBanners(); } catch (error) { alert('Failed to delete banner: ' + error.message); } }
    function addNewBanner() { (async () => { try { const { error } = await supabaseClient.from('Banners').insert([{ Image: 'https://example.com/placeholder.jpg', Hyperlink: 'https://example.com', Type: 'All' }]); if (error) throw error; await loadBanners(); } catch (error) { alert('Failed to add banner: ' + error.message); } })(); }
    async function fetchCategories() { try { const response = await fetch('/categories.json'); if (!response.ok) throw new Error('Network response was not ok'); categoryData = await response.json(); updateCategoryOptions(currentTable); } catch (error) { console.error('Failed to fetch categories:', error); } }
    function updateCategoryOptions(table) { const categorySelect = document.getElementById('categorySelect'); categorySelect.innerHTML = ''; const categories = categoryData[table] || []; categories.forEach(category => { const option = new Option(category, category); categorySelect.add(option); }); }
    function showModal(job) { const modalContent = document.getElementById('modal-content'); modalContent.innerHTML = ` <h2 class="text-2xl font-bold mb-2">${job.Company}</h2> <p class="text-gray-600 mb-4">${job.Location}</p> ${job.Salary ? `<p class="text-lg font-semibold text-green-600 mb-4">₹${job.Salary}</p>` : ''} <div class="mb-4"> <h3 class="font-bold text-gray-800 mb-2">Description:</h3> <div class="text-gray-700 whitespace-pre-line">${job.Description}</div> </div> <div> <h3 class="font-bold text-gray-800 mb-2">Application Details:</h3> <p class="text-gray-700">${job['Application ID']}</p> </div> ${job.connect_link ? ` <div class="mt-4"> <h3 class="font-bold text-gray-800 mb-2">Peer Connection:</h3> <a href="${job.connect_link}" target="_blank" class="text-blue-600 hover:underline">${job.connect_link}</a> </div>` : ''} `; document.getElementById('modal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    function closeModal(event) { const modal = document.getElementById('modal'); if (event.target === modal || event.target.closest('.modal-close')) { modal.style.display = 'none'; document.body.style.overflow = 'auto'; } }
    function showAddJobModal() { const modal = document.getElementById('job-edit-modal'); document.getElementById('job-edit-title').textContent = 'Add New Job'; const form = document.getElementById('job-form'); form.reset(); form.elements['id'].value = ''; const now = new Date(); form.elements['Created_At'].value = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16); form.elements['table'].value = currentTable; updateCategoryOptions(currentTable); const experienceFormGroup = document.getElementById('experience-form-group'); if (currentTable === 'Fresher Jobs' || currentTable === 'Semi Qualified Jobs') { experienceFormGroup.style.display = 'block'; } else { experienceFormGroup.style.display = 'none'; } modal.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    function closeJobEditModal() { document.getElementById('job-edit-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    async function showEditJobModal(job) { const modal = document.getElementById('job-edit-modal'); const form = document.getElementById('job-form'); form.reset(); document.getElementById('job-edit-title').textContent = 'Edit Job'; form.elements['table'].value = currentTable; updateCategoryOptions(currentTable); const experienceFormGroup = document.getElementById('experience-form-group'); if (currentTable === 'Fresher Jobs' || currentTable === 'Semi Qualified Jobs') { experienceFormGroup.style.display = 'block'; } else { experienceFormGroup.style.display = 'none'; } Object.keys(job).forEach(field => { const input = form.elements[field]; if (input) { if (field === 'Created_At' && job[field]) { const date = new Date(job[field]); input.value = new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().slice(0, 16); } else { input.value = job[field]; } } }); form.elements['id'].value = job.id; modal.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    async function getJobById(id, table) { try { const { data, error } = await supabaseClient.from(table).select('*').eq('id', id).single(); if (error) throw error; return data; } catch (error) { console.error('Error fetching job:', error); return null; } }
    async function deleteJob(id, table) { if (!confirm('Are you sure you want to delete this job?')) return; try { const { error } = await supabaseClient.from(table).delete().eq('id', id); if (error) throw error; const cardToRemove = document.querySelector(`.job-card[data-job-id='${id}']`); if (cardToRemove) { cardToRemove.style.transition = 'opacity 0.3s ease, transform 0.3s ease'; cardToRemove.style.opacity = '0'; cardToRemove.style.transform = 'scale(0.95)'; setTimeout(() => cardToRemove.remove(), 300); } } catch (error) { alert('Failed to delete job: ' + error.message); } }
    function renderJobCard(job, table) { const jobCard = document.createElement('article'); jobCard.className = 'job-card'; jobCard.dataset.jobId = job.id; jobCard.innerHTML = ` <div class="admin-job-actions"> <button class="icon-btn edit-icon-btn" data-action="edit" title="Edit Job"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button> <button class="icon-btn delete-icon-btn" data-action="delete" title="Delete Job"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button> </div> <div class="job-info"> <h2 class="job-company">${job.Company || 'N/A'}</h2> <div class="job-meta"> <span class="job-tag location-tag"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${job.Location || 'N/A'}</span> ${job.Salary ? `<span class="job-tag salary-tag"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>₹${job.Salary}</span>` : ''} </div> </div>`; return jobCard; }

    async function fetchJobs(searchTerm = '', locationSearch = '', salary = '', experience = '') {
      if (isFetching) return;
      isFetching = true;
      const loader = document.getElementById('loader');
      const loadMoreBtn = document.getElementById('loadMore');
      loader.style.display = 'flex';
      loadMoreBtn.disabled = true;
      try {
        let selectColumns = 'id, Company, Location, Salary, Description, "Application ID", Created_At, connect_link';
        if (currentTable === "Fresher Jobs" || currentTable === "Semi Qualified Jobs") {
          selectColumns += ', Experience';
        }

        let query = supabaseClient.from(currentTable).select(selectColumns, { count: 'exact' });

        if (searchTerm) query = query.or(`Company.ilike.%${searchTerm}%,Location.ilike.%${searchTerm}%,Description.ilike.%${searchTerm}%`);
        if (locationSearch) query = query.ilike('Location', `%${locationSearch}%`);

        if (salary) {
          if (salary.endsWith('+')) query = query.gte('Salary', parseInt(salary));
          else { const [min, max] = salary.split('-').map(Number); query = query.gte('Salary', min).lte('Salary', max); }
        }

        // MODIFICATION: Add experience filter logic
        if (experience && (currentTable === "Fresher Jobs" || currentTable === "Semi Qualified Jobs")) {
          if (experience === 'null') {
            query = query.is('Experience', null);
          } else {
            query = query.eq('Experience', experience);
          }
        }

        query = query.order('Created_At', { ascending: false }).range(page * limit, (page + 1) * limit - 1);

        const { data, error } = await query;
        if (error) throw error;

        const jobsContainer = document.getElementById('jobs');
        if (data && data.length > 0) {
          data.forEach(job => jobsContainer.appendChild(renderJobCard(job, currentTable)));
          page++;
          hasMoreData = data.length === limit;
          loadMoreBtn.style.display = hasMoreData ? 'block' : 'none';
        } else {
          hasMoreData = false;
          loadMoreBtn.style.display = 'none';
          if (page === 0) jobsContainer.textContent = 'No jobs found.';
        }
      } catch (error) {
        document.getElementById('jobs').textContent = 'Failed to load jobs: ' + error.message;
      } finally {
        isFetching = false;
        loader.style.display = 'none';
        loadMoreBtn.disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try { await checkAdmin(); } catch (error) { return; }

      const dom = {
        searchInput: document.getElementById('searchInput'),
        locationSearchInput: document.getElementById('locationSearchInput'),
        salaryFilter: document.getElementById('salaryFilter'),
        experienceFilter: document.getElementById('experienceFilter'),
        experienceFilterContainer: document.getElementById('experienceFilterContainer'),
        loadMore: document.getElementById('loadMore'),
        jobForm: document.getElementById('job-form'),
        jobs: document.getElementById('jobs'),
        tableSelect: document.getElementById('tableSelect'),
        downloadProfilesBtn: document.getElementById('downloadProfilesBtn'),
        profileExportPanel: document.getElementById('profileExportPanel'),
        profileExportCloseBtn: document.getElementById('profileExportCloseBtn'),
        profileExportResetBtn: document.getElementById('profileExportResetBtn'),
        profileExportConfirmBtn: document.getElementById('profileExportConfirmBtn')
      };

      let debounceTimeout = null;
      const debouncedFetch = () => {
        clearTimeout(debounceTimeout);
        debounceTimeout = setTimeout(() => {
          page = 0;
          dom.jobs.innerHTML = '';
          hasMoreData = true;
          fetchJobs(dom.searchInput.value, dom.locationSearchInput.value, dom.salaryFilter.value, dom.experienceFilter.value);
        }, 300);
      };

      dom.searchInput.addEventListener('input', debouncedFetch);
      dom.locationSearchInput.addEventListener('input', debouncedFetch);
      dom.salaryFilter.addEventListener('change', debouncedFetch);
      dom.experienceFilter.addEventListener('change', debouncedFetch);
      dom.loadMore.addEventListener('click', () => fetchJobs(dom.searchInput.value, dom.locationSearchInput.value, dom.salaryFilter.value, dom.experienceFilter.value));
      if (dom.downloadProfilesBtn) {
        dom.downloadProfilesBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          toggleProfileExportPanel();
        });
      }
      if (dom.profileExportConfirmBtn) {
        dom.profileExportConfirmBtn.addEventListener('click', () => exportProfilesCsv(dom.profileExportConfirmBtn));
      }
      if (dom.profileExportResetBtn) {
        dom.profileExportResetBtn.addEventListener('click', resetProfileExportFilters);
      }
      if (dom.profileExportCloseBtn) {
        dom.profileExportCloseBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          toggleProfileExportPanel(false);
        });
      }
      if (dom.profileExportPanel) {
        dom.profileExportPanel.addEventListener('change', (event) => {
          if (event.target.matches('input[name="profileExportMode"]')) updateProfileExportFields();
        });
        updateProfileExportFields();
      }
      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Escape') return;
        if (!dom.profileExportPanel?.classList.contains('open')) return;
        event.preventDefault();
        toggleProfileExportPanel(false);
      });
      document.addEventListener('click', (event) => {
        if (!dom.profileExportPanel?.classList.contains('open')) return;
        const exportWrap = event.target.closest('.export-menu-wrap');
        if (!exportWrap) toggleProfileExportPanel(false);
      });

      document.querySelectorAll('.footer-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.footer-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentTable = tab.dataset.table;

          if (currentTable === 'Fresher Jobs' || currentTable === 'Semi Qualified Jobs') {
            dom.experienceFilterContainer.style.display = 'block';
          } else {
            dom.experienceFilterContainer.style.display = 'none';
            dom.experienceFilter.value = '';
          }

          debouncedFetch();
        });
      });

      dom.jobForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitButton = e.target.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.classList.add('loading');
        try {
          const formData = new FormData(e.target);
          const jobData = Object.fromEntries(formData.entries());
          const { table, id, ...dataToSave } = jobData;

          if (dataToSave.Salary === '') dataToSave.Salary = null;
          if (dataToSave.connect_link === '') dataToSave.connect_link = null;

          if (table !== 'Fresher Jobs' && table !== 'Semi Qualified Jobs') {
            delete dataToSave.Experience;
          } else if (dataToSave.Experience === '') {
            dataToSave.Experience = null;
          }

          const isEdit = id && id.trim() !== '';
          let savedJob;

          if (isEdit) {
            const { data, error } = await supabaseClient.from(table).update(dataToSave).eq('id', id).select().single();
            if (error) throw error;
            savedJob = data;
          } else {
            const { data, error } = await supabaseClient.from(table).insert([dataToSave]).select().single();
            if (error) throw error;
            savedJob = data;
            if (currentSession?.access_token) {
              await triggerNotifications({ ...savedJob, table }, currentSession.access_token);
            }
          }

          closeJobEditModal();
          debouncedFetch();
        } catch (error) {
          alert('Failed to save job: ' + error.message);
        } finally {
          submitButton.disabled = false;
          submitButton.classList.remove('loading');
        }
      });

      dom.jobs.addEventListener('click', async (e) => {
        const card = e.target.closest('.job-card');
        if (!card) return;
        const button = e.target.closest('button[data-action]');
        const jobId = card.dataset.jobId;
        if (button) {
          e.stopPropagation();
          const action = button.dataset.action;
          if (action === 'delete') { await deleteJob(jobId, currentTable); }
          else if (action === 'edit') { const jobDetails = await getJobById(jobId, currentTable); if (jobDetails) showEditJobModal(jobDetails); }
        } else { const job = await getJobById(jobId, currentTable); if (job) showModal(job); }
      });

      dom.tableSelect.addEventListener('change', (e) => {
        const selectedTable = e.target.value;
        updateCategoryOptions(selectedTable);
        const experienceFormGroup = document.getElementById('experience-form-group');
        if (selectedTable === 'Fresher Jobs' || selectedTable === 'Semi Qualified Jobs') {
          experienceFormGroup.style.display = 'block';
        } else {
          experienceFormGroup.style.display = 'none';
        }
      });

      window.addNewBanner = addNewBanner;
      window.showAddJobModal = showAddJobModal;
      window.closeJobEditModal = closeJobEditModal;
      window.closeModal = closeModal;

      try { await loadBanners(); } catch (error) { console.error("Failed to load banners:", error); }
      try { await fetchCategories(); await fetchJobs(); } catch (error) { console.error("Failed to load initial data:", error); }
    });
  </script>
