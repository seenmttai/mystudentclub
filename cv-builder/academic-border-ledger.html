<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV - Academic Border Ledger</title>
    <style>
        :root {
            --blue-header: #16365d;
            --light-blue-bg: #dbe1ee;
            --border-color: #000000;
            --text-black: #000000;
            --bg-white: #ffffff;
            --font-main: 'Times New Roman', Times, serif;
            --viewer-bg: #525659;
            --ref-width: 1000px;
            --ref-height: 1414px;
            --content-scale: 1;
        }

        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            background-color: var(--viewer-bg);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease-in;
        }

        #zoom-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .resume-container {
            width: var(--ref-width);
            height: var(--ref-height);
            background: var(--bg-white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            padding: calc(30px * var(--content-scale)) calc(35px * var(--content-scale));
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transform-origin: top center;
            font-size: calc(16.5px * var(--content-scale));
            color: var(--text-black);
            line-height: 1.35;
            overflow: hidden;
        }

        .bold { font-weight: bold; }
        .template { display: none !important; }

        .cv-outer-border {
            border: 1px solid var(--border-color);
            padding: calc(15px * var(--content-scale)) calc(20px * var(--content-scale)) calc(20px * var(--content-scale)) calc(20px * var(--content-scale));
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-white);
        }

        .cv-border-box {
            border: 1px solid var(--border-color);
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-white);
            margin-top: calc(12px * var(--content-scale));
        }

        .border-sep-bottom { border-bottom: 1px solid var(--border-color); }

        header {
            padding: 0;
            text-align: left;
        }

        h1 {
            font-size: calc(30px * var(--content-scale));
            font-weight: bold;
            color: var(--text-black);
            line-height: 1.1;
            margin-bottom: calc(4px * var(--content-scale));
        }

        .subtitle {
            font-size: calc(15px * var(--content-scale));
            margin-bottom: calc(4px * var(--content-scale));
        }

        .contact-info {
            font-size: calc(15.5px * var(--content-scale));
            line-height: 1.4;
        }

        .contact-info .contact-icon-item {
            display: flex !important;
            align-items: center;
            margin-bottom: calc(2px * var(--content-scale));
        }

        .contact-info .contact-sep { display: none !important; }

        .contact-info .contact-icon-glyph {
            width: calc(16px * var(--content-scale));
            margin-right: calc(4px * var(--content-scale));
        }

        .contact-info a,
        .contact-info .contact-icon-text {
            color: #0f4c81 !important;
        }

        .contact-info a {
            text-decoration: none !important;
        }

        .contact-info a .contact-icon-text {
            text-decoration: underline !important;
        }

        .section-banner,
        .section-header {
            background-color: var(--blue-header);
            color: white;
            padding: calc(5px * var(--content-scale)) calc(8px * var(--content-scale));
            font-weight: bold;
            font-size: calc(16.5px * var(--content-scale));
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .about-content,
        .list-content {
            padding: calc(10px * var(--content-scale)) calc(15px * var(--content-scale));
            font-size: calc(14.5px * var(--content-scale));
            text-align: justify;
            line-height: 1.35;
        }

        .edu-table {
            width: 100%;
            border-collapse: collapse;
            font-size: calc(15px * var(--content-scale));
            border: none;
        }

        .edu-table th,
        .edu-table td {
            border: 1px solid var(--border-color);
            padding: calc(5px * var(--content-scale)) calc(8px * var(--content-scale));
            vertical-align: middle;
            text-align: center;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .edu-table th {
            font-weight: bold;
            background-color: var(--bg-white);
            border-top: none;
        }

        .edu-table td:first-child,
        .edu-table th:first-child { border-left: none; }
        .edu-table td:last-child,
        .edu-table th:last-child { border-right: none; }
        .edu-table tr:last-child td { border-bottom: none; }

        .col-year { width: 12%; }
        .col-degree { width: 24%; }
        .col-inst { width: 34%; }
        .col-pct { width: 12%; }
        .col-remarks { width: 18%; }

        .job-group { display: block; }

        .job-header-row {
            background-color: var(--section-bg, var(--light-blue-bg));
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: calc(15.5px * var(--content-scale));
            padding: calc(6px * var(--content-scale)) calc(12px * var(--content-scale));
            border-bottom: 1px solid var(--border-color);
        }

        .job-title-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: calc(12px * var(--content-scale));
        }

        .job-title-row span:last-child { white-space: nowrap; text-align: right; }

        .job-grid-row {
            display: flex;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
        }

        #experience-list .job-group:not(.template):last-child .job-grid-row {
            border-bottom: none;
        }

        .job-grid-left {
            width: 18%;
            background-color: var(--section-bg, var(--light-blue-bg));
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: calc(8px * var(--content-scale)) calc(6px * var(--content-scale));
            border-right: 1px solid var(--border-color);
            font-size: calc(14.5px * var(--content-scale));
            flex-shrink: 0;
            line-height: 1.25;
        }

        .job-grid-right {
            width: 82%;
            padding: calc(8px * var(--content-scale)) calc(12px * var(--content-scale));
            vertical-align: top;
            font-size: calc(14.5px * var(--content-scale));
        }

        ul {
            list-style-type: disc;
            margin-left: calc(20px * var(--content-scale));
        }

        li {
            font-size: calc(14.5px * var(--content-scale));
            margin-bottom: calc(3px * var(--content-scale));
            text-align: justify;
            line-height: 1.35;
        }

        li:last-child { margin-bottom: 0; }

        [data-field="summary"] p,
        [data-field="summary"] ul,
        [data-field="summary"] ol,
        [data-field="skills"] ul,
        [data-field="skills"] ol {
            margin-top: 0;
            margin-bottom: 0;
        }

        .universal-injected .section-header,
        .custom-section-injected .section-header {
            background-color: var(--blue-header);
            border-color: var(--blue-header);
        }

        .universal-injected .section-header + div,
        .custom-section-injected .section-header + div {
            padding: calc(10px * var(--content-scale)) calc(15px * var(--content-scale));
            border-bottom: 1px solid var(--border-color);
            font-size: calc(14.5px * var(--content-scale));
        }

        .academic-ledger-last-visible.custom-section-injected .section-header + div,
        .academic-ledger-last-visible.universal-injected .section-header + div,
        .academic-ledger-last-visible.custom-section-injected > ul,
        .academic-ledger-last-visible.universal-injected > ul {
            border-bottom: 0 !important;
        }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            html, body {
                width: 210mm;
                height: 297mm;
                margin: 0 !important;
                padding: 0 !important;
                overflow: hidden !important;
                background: #ffffff !important;
            }
            #zoom-wrapper {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                transform: none !important;
            }
            .resume-container {
                width: 1000px !important;
                margin: 0 auto !important;
                box-shadow: none !important;
                border: none !important;
                zoom: 0.7937;
                -moz-transform: scale(0.7937);
                -moz-transform-origin: top center;
                transform: none !important;
                position: static !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>
<body>
    <div id="zoom-wrapper">
        <div class="resume-container" id="cv-page">
            <div class="cv-outer-border">
                <header>
                    <h1 data-field="name"></h1>
                    <div class="subtitle" data-field="tagline"></div>
                    <div class="contact-info" data-field="contact"></div>
                </header>

                <div class="cv-border-box" data-section-append-host>
                    <div class="border-sep-bottom sortable-section" data-section-id="summary">
                        <div class="section-banner section-header border-sep-bottom">About Me</div>
                        <div class="about-content" data-field="summary"></div>
                    </div>

                    <div class="border-sep-bottom sortable-section" data-section-id="education">
                        <div class="section-banner section-header border-sep-bottom">Academic Qualifications</div>
                        <table class="edu-table">
                            <thead>
                                <tr>
                                    <th class="col-year">Year</th>
                                    <th class="col-degree">Degree/Examination</th>
                                    <th class="col-inst">Board/Institute</th>
                                    <th class="col-pct">Score</th>
                                    <th class="col-remarks">Remarks</th>
                                </tr>
                            </thead>
                            <tbody id="education-list">
                                <tr class="template">
                                    <td data-field="year"></td>
                                    <td class="bold" data-field="degree"></td>
                                    <td data-field="institution"></td>
                                    <td data-field="marks"></td>
                                    <td data-field="remarks"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="border-sep-bottom sortable-section" data-section-id="experience">
                        <div class="section-banner section-header border-sep-bottom">Work Experience</div>
                        <div id="experience-list">
                            <div class="job-group template">
                                <div class="job-header-row job-header">
                                    <div class="job-title-row">
                                        <span><span data-field="company"></span> - <span data-field="role"></span></span>
                                        <span data-field="dates"></span>
                                    </div>
                                </div>
                                <div class="job-grid-row">
                                    <div class="job-grid-left" data-field="category"></div>
                                    <div class="job-grid-right">
                                        <ul data-list="bullets"></ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="border-sep-bottom sortable-section" data-section-id="projects">
                        <div class="section-banner section-header border-sep-bottom">Projects</div>
                        <div id="projects-list">
                            <div class="list-content template">
                                <div class="bold" data-field="title"></div>
                                <div data-field="description"></div>
                                <ul data-list="bullets"></ul>
                            </div>
                        </div>
                    </div>

                    <div class="border-sep-bottom sortable-section" data-section-id="achievements">
                        <div class="section-banner section-header">Achievements</div>
                        <div class="list-content">
                            <ul data-list="achievements"></ul>
                        </div>
                    </div>

                    <div class="border-sep-bottom sortable-section" data-section-id="skills">
                        <div class="section-banner section-header">Technical Skills</div>
                        <div class="list-content">
                            <div data-field="skills"></div>
                        </div>
                    </div>

                    <div class="border-sep-bottom sortable-section" data-section-id="certifications">
                        <div class="section-banner section-header">Certifications</div>
                        <div class="list-content">
                            <ul data-list="certifications"></ul>
                        </div>
                    </div>

                    <div class="border-sep-bottom sortable-section" data-section-id="leadership">
                        <div class="section-banner section-header">Leadership</div>
                        <div class="list-content">
                            <ul data-list="leadership"></ul>
                        </div>
                    </div>

                    <div class="sortable-section" data-section-id="interests">
                        <div class="section-banner section-header">Soft Skills & Hobbies</div>
                        <div class="list-content">
                            <ul data-list="interests"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="cv-common.js"></script>
    <script>
        function updateAcademicLedgerBorders() {
            const box = document.querySelector('.cv-border-box');
            if (!box) return;

            const sections = Array.from(box.querySelectorAll(':scope > .sortable-section'));
            sections.forEach(section => {
                section.classList.add('border-sep-bottom');
                section.classList.remove('academic-ledger-last-visible');
            });

            const visibleSections = sections.filter(section => {
                return section.style.display !== 'none' && getComputedStyle(section).display !== 'none';
            });
            const lastVisible = visibleSections[visibleSections.length - 1];
            if (lastVisible) {
                lastVisible.classList.remove('border-sep-bottom');
                lastVisible.classList.add('academic-ledger-last-visible');
            }
        }

        let academicLedgerBorderFrame = null;
        function scheduleAcademicLedgerBorderUpdate() {
            if (academicLedgerBorderFrame) cancelAnimationFrame(academicLedgerBorderFrame);
            academicLedgerBorderFrame = requestAnimationFrame(() => {
                academicLedgerBorderFrame = null;
                updateAcademicLedgerBorders();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const box = document.querySelector('.cv-border-box');
            if (!box) return;

            updateAcademicLedgerBorders();
            const observer = new MutationObserver(scheduleAcademicLedgerBorderUpdate);
            observer.observe(box, {
                attributes: true,
                attributeFilter: ['class', 'style'],
                childList: true,
                subtree: true
            });
        });

        function scaleToFit() {
            const page = document.getElementById('cv-page');
            if (!page || document.body.classList.contains('print-mode')) return;
            const targetWidth = window.innerWidth - 20;
            const refWidth = 1000;
            const scale = targetWidth < refWidth ? targetWidth / refWidth : 1;
            page.style.transform = `scale(${scale})`;
            const spaceToRemove = 1414 - (1414 * scale);
            page.style.margin = '20px auto';
            page.style.marginBottom = `${20 - spaceToRemove}px`;
        }

        function shrinkContentToFit() {
            const page = document.getElementById('cv-page');
            if (!page) return;
            let contentScale = 1;
            document.documentElement.style.setProperty('--content-scale', contentScale);
            let iterations = 0;
            while (page.scrollHeight > 1414 && iterations < 60) {
                contentScale -= 0.01;
                document.documentElement.style.setProperty('--content-scale', contentScale);
                iterations++;
            }
        }

        let screenTransform = '';
        let screenMarginBottom = '';

        function enablePrintMode() {
            const page = document.getElementById('cv-page');
            if (!page) return;
            screenTransform = page.style.transform;
            screenMarginBottom = page.style.marginBottom;
            document.body.classList.add('print-mode');
            page.style.transform = 'scale(1)';
            page.style.marginBottom = '0px';
            shrinkContentToFit();
        }

        function disablePrintMode() {
            const page = document.getElementById('cv-page');
            if (!page) return;
            document.body.classList.remove('print-mode');
            page.style.transform = screenTransform || '';
            page.style.marginBottom = screenMarginBottom || '';
            scaleToFit();
        }

        function handlePrintChange(e) {
            if (e.matches) enablePrintMode();
            else disablePrintMode();
        }

        function init() {
            shrinkContentToFit();
            scaleToFit();
            document.body.style.opacity = '1';
            const printMedia = window.matchMedia('print');
            if (printMedia.addEventListener) printMedia.addEventListener('change', handlePrintChange);
            else if (printMedia.addListener) printMedia.addListener(handlePrintChange);
            window.addEventListener('beforeprint', enablePrintMode);
            window.addEventListener('afterprint', disablePrintMode);
        }

        window.addEventListener('load', init);

        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(scaleToFit, 100);
        });
    </script>
</body>
</html>
