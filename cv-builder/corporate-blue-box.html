<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV - Corporate Blue Box</title>
    <style>
        :root {
            --blue-header: #003071;
            --light-blue-bg: #ebebeb;
            --border-color: #000000;
            --text-black: #000000;
            --bg-white: #ffffff;
            --font-main: 'Calibri', 'Arial', sans-serif;
            --viewer-bg: #525659;
            --ref-width: 1000px;
            --ref-height: 1414px;
            --content-scale: 1;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            background-color: var(--viewer-bg);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease-in;
        }

        #zoom-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .resume-container {
            width: var(--ref-width);
            height: var(--ref-height);
            background: var(--bg-white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            padding: calc(30px * var(--content-scale)) calc(35px * var(--content-scale));
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transform-origin: top center;
            font-size: calc(16.5px * var(--content-scale));
            color: var(--text-black);
            line-height: 1.35;
            overflow: hidden;
        }

        .bold { font-weight: bold; }
        .underline { text-decoration: underline; }
        .justify { text-align: justify; }
        .right { text-align: right; }
        .center { text-align: center; }
        .uppercase { text-transform: uppercase; }
        .template { display: none !important; }

        header {
            display: flex;
            flex-direction: column;
            margin-bottom: calc(10px * var(--content-scale));
            width: 100%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            gap: calc(12px * var(--content-scale));
        }

        h1 {
            font-size: calc(34px * var(--content-scale));
            font-weight: bold;
            color: var(--blue-header);
            text-transform: uppercase;
            line-height: 1;
            white-space: nowrap;
        }

        .subtitle {
            font-size: calc(17.5px * var(--content-scale));
            font-weight: normal;
            margin-top: calc(4px * var(--content-scale));
            color: #000000;
        }

        .contact-info {
            font-size: calc(15.5px * var(--content-scale));
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: calc(8px * var(--content-scale));
            white-space: nowrap;
            text-align: right;
        }

        .contact-item,
        .contact-icon-item {
            display: inline-flex !important;
            align-items: center;
            color: var(--text-black);
            text-decoration: none;
            gap: calc(4px * var(--content-scale));
            white-space: nowrap;
        }

        .contact-item a,
        .contact-icon-item a,
        .contact-icon-text {
            color: var(--blue-header) !important;
        }

        .contact-item a,
        .contact-icon-item a {
            text-decoration: none !important;
        }

        .contact-item a .contact-icon-text,
        .contact-icon-item a .contact-icon-text {
            text-decoration: underline !important;
        }

        .contact-sep {
            color: var(--text-black) !important;
            margin: 0 !important;
        }

        .contact-icon,
        .contact-icon-glyph {
            width: calc(16px * var(--content-scale));
            height: calc(16px * var(--content-scale));
            margin-right: calc(4px * var(--content-scale));
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: middle;
            color: var(--text-black) !important;
        }

        .linkedin-icon {
            fill: currentColor;
            stroke: none;
        }

        .contact-icon-glyph-linkedin {
            color: #111111 !important;
        }

        .contact-icon-glyph-linkedin svg {
            fill: currentColor !important;
            stroke: none !important;
        }

        .section-banner,
        .section-header {
            background-color: var(--blue-header);
            color: white;
            padding: calc(4px * var(--content-scale)) calc(10px * var(--content-scale));
            font-weight: bold;
            font-size: calc(17.5px * var(--content-scale));
            text-transform: uppercase;
            border: 1px solid var(--blue-header);
            margin-top: calc(10px * var(--content-scale));
            text-align: left;
            letter-spacing: 0.5px;
        }

        .sortable-section:first-of-type .section-banner {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: calc(16px * var(--content-scale));
        }

        th,
        td {
            border: none;
            padding: calc(5px * var(--content-scale)) calc(8px * var(--content-scale));
            vertical-align: top;
            text-align: left;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        th {
            font-weight: bold;
            background-color: #f2f2f2;
        }

        th:first-child,
        td:first-child {
            padding-left: calc(12px * var(--content-scale));
        }

        th:last-child,
        td:last-child {
            padding-right: calc(12px * var(--content-scale));
        }

        .col-edu { width: 18%; }
        .col-year { width: 12%; }
        .col-inst { width: 40%; }
        .col-pct { width: 15%; }
        .col-rem { width: 15%; }

        .content-box {
            border: 1px solid var(--border-color);
            padding: calc(8px * var(--content-scale)) calc(12px * var(--content-scale));
            margin-bottom: calc(4px * var(--content-scale));
            background-color: var(--bg-white);
        }

        .content-box.no-padding {
            padding: 0;
        }

        .job-group {
            display: block;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: calc(16.5px * var(--content-scale));
            padding: calc(6px * var(--content-scale)) calc(12px * var(--content-scale));
            background-color: var(--section-bg, var(--light-blue-bg));
            border-bottom: 1px solid var(--border-color);
            color: var(--blue-header);
        }

        .job-title-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: calc(14px * var(--content-scale));
        }

        .job-title-row span:last-child {
            white-space: nowrap;
            text-align: right;
        }

        .job-details {
            padding: calc(8px * var(--content-scale)) calc(12px * var(--content-scale));
        }

        #experience-list .job-group:not(.template):not(:last-child) .job-details {
            border-bottom: 1px solid var(--border-color);
        }

        .sub-label {
            font-weight: bold;
            font-size: calc(16px * var(--content-scale));
            margin-bottom: calc(4px * var(--content-scale));
            display: block;
        }

        .cell-sub-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: calc(16.5px * var(--content-scale));
            margin-bottom: calc(4px * var(--content-scale));
        }

        ul {
            list-style-type: disc;
            margin-left: calc(20px * var(--content-scale));
        }

        li {
            font-size: calc(16px * var(--content-scale));
            margin-bottom: calc(3px * var(--content-scale));
            text-align: justify;
            line-height: 1.35;
        }

        li:last-child {
            margin-bottom: 0;
        }

        [data-field="summary"] p,
        [data-field="summary"] ul,
        [data-field="summary"] ol,
        [data-field="skills"] ul,
        [data-field="skills"] ol {
            margin-top: 0;
            margin-bottom: 0;
        }

        .universal-injected .section-header,
        .custom-section-injected .section-header {
            background-color: var(--blue-header);
            border-color: var(--blue-header);
        }

        .universal-injected .section-header + div,
        .custom-section-injected .section-header + div {
            border: 1px solid var(--border-color);
            padding: calc(8px * var(--content-scale)) calc(12px * var(--content-scale));
            margin-bottom: calc(4px * var(--content-scale));
            background-color: var(--bg-white);
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            html,
            body {
                width: 210mm;
                height: 297mm;
                margin: 0 !important;
                padding: 0 !important;
                overflow: hidden !important;
                background: #ffffff !important;
            }

            #zoom-wrapper {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                transform: none !important;
            }

            .resume-container {
                width: 1000px !important;
                margin: 0 auto !important;
                box-shadow: none !important;
                border: none !important;
                zoom: 0.7937;
                -moz-transform: scale(0.7937);
                -moz-transform-origin: top center;
                transform: none !important;
                position: static !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>
<body>
    <div id="zoom-wrapper">
        <div class="resume-container" id="cv-page">
            <header>
                <div class="header-top">
                    <h1 data-field="name"></h1>
                    <div class="contact-info" data-field="contact"></div>
                </div>
                <div class="subtitle" data-field="tagline"></div>
            </header>

            <div class="sortable-section" data-section-id="summary">
                <div class="section-banner section-header">Professional Summary</div>
                <div class="content-box justify" data-field="summary"></div>
            </div>

            <div class="sortable-section" data-section-id="experience">
                <div class="section-banner section-header">Work Experience</div>
                <div class="content-box no-padding" id="experience-list">
                    <div class="job-group template">
                        <div class="job-header">
                            <div class="job-title-row">
                                <span><span data-field="company"></span> - <span data-field="role"></span></span>
                                <span data-field="dates"></span>
                            </div>
                        </div>
                        <div class="job-details">
                            <span class="sub-label" data-field="category"></span>
                            <ul data-list="bullets"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sortable-section" data-section-id="education">
                <div class="section-banner section-header">Educational Qualifications</div>
                <div class="content-box no-padding">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-edu">EDUCATION</th>
                                <th class="col-year">YEAR</th>
                                <th class="col-inst">INSTITUTION</th>
                                <th class="col-pct">PERCENTAGE</th>
                                <th class="col-rem">REMARKS</th>
                            </tr>
                        </thead>
                        <tbody id="education-list">
                            <tr class="template">
                                <td class="bold" data-field="degree"></td>
                                <td data-field="year"></td>
                                <td data-field="institution"></td>
                                <td data-field="marks"></td>
                                <td data-field="remarks"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="sortable-section" data-section-id="projects">
                <div class="section-banner section-header">Projects</div>
                <div id="projects-list">
                    <div class="job-group template">
                        <div class="content-box">
                            <div class="cell-sub-header">
                                <span data-field="title"></span>
                            </div>
                            <div data-field="description"></div>
                            <ul data-list="bullets"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sortable-section" data-section-id="leadership">
                <div class="section-banner section-header">Position of Responsibility</div>
                <div class="content-box">
                    <ul data-list="leadership"></ul>
                </div>
            </div>

            <div class="sortable-section" data-section-id="skills">
                <div class="section-banner section-header">Technical Skills</div>
                <div class="content-box">
                    <div data-field="skills"></div>
                </div>
            </div>

            <div class="sortable-section" data-section-id="certifications">
                <div class="section-banner section-header">Significant Awards & Certifications</div>
                <div class="content-box">
                    <ul data-list="certifications"></ul>
                </div>
            </div>

            <div class="sortable-section" data-section-id="interests">
                <div class="section-banner section-header">Extra-Curricular</div>
                <div class="content-box">
                    <ul data-list="interests"></ul>
                </div>
            </div>

            <div class="sortable-section" data-section-id="achievements">
                <div class="section-banner section-header">Achievements</div>
                <div class="content-box">
                    <ul data-list="achievements"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="cv-common.js"></script>
    <script>
        function scaleToFit() {
            const page = document.getElementById('cv-page');
            if (!page || document.body.classList.contains('print-mode')) return;

            const windowWidth = window.innerWidth;
            const targetWidth = windowWidth - 20;
            const refWidth = 1000;
            let scale = 1;

            if (targetWidth < refWidth) {
                scale = targetWidth / refWidth;
            }

            page.style.transform = `scale(${scale})`;

            const refHeight = 1414;
            const currentVisualHeight = refHeight * scale;
            const spaceToRemove = refHeight - currentVisualHeight;
            page.style.marginBottom = `-${spaceToRemove}px`;
        }

        function shrinkContentToFit() {
            const page = document.getElementById('cv-page');
            if (!page) return;
            const maxHeight = 1414;

            let contentScale = 1.0;
            document.documentElement.style.setProperty('--content-scale', contentScale);

            let iterations = 0;
            while (page.scrollHeight > maxHeight && iterations < 60) {
                contentScale -= 0.01;
                document.documentElement.style.setProperty('--content-scale', contentScale);
                iterations++;
            }
        }

        let screenTransform = '';
        let screenMarginBottom = '';

        function enablePrintMode() {
            const page = document.getElementById('cv-page');
            if (!page) return;
            screenTransform = page.style.transform;
            screenMarginBottom = page.style.marginBottom;
            document.body.classList.add('print-mode');

            page.style.transform = 'scale(1)';
            page.style.marginBottom = '0px';

            shrinkContentToFit();
        }

        function disablePrintMode() {
            const page = document.getElementById('cv-page');
            if (!page) return;
            document.body.classList.remove('print-mode');

            page.style.transform = screenTransform || '';
            page.style.marginBottom = screenMarginBottom || '';

            scaleToFit();
        }

        function handlePrintChange(e) {
            if (e.matches) {
                enablePrintMode();
            } else {
                disablePrintMode();
            }
        }

        function init() {
            shrinkContentToFit();
            scaleToFit();
            document.body.style.opacity = '1';

            const printMedia = window.matchMedia('print');
            if (printMedia.addEventListener) {
                printMedia.addEventListener('change', handlePrintChange);
            } else if (printMedia.addListener) {
                printMedia.addListener(handlePrintChange);
            }

            window.addEventListener('beforeprint', enablePrintMode);
            window.addEventListener('afterprint', disablePrintMode);
        }

        window.addEventListener('load', init);

        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(scaleToFit, 100);
        });
    </script>
</body>
</html>
