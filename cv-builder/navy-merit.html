<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV - Template 13</title>
    <style>
        :root {
            --blue-header: #001f5f;
            --blue-subheader: #d9e2f3;
            --border-color: #000000;
            --text-black: #000000;
            --bg-white: #ffffff;
            --font-main: 'Calibri', 'Arial', 'Helvetica', sans-serif;
            --viewer-bg: #525659;
            --ref-width: 1000px;
            --ref-height: 1414px;
            --content-scale: 1;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            background-color: var(--viewer-bg);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease-in;
        }

        #zoom-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .cv-page {
            width: var(--ref-width);
            height: var(--ref-height);
            background: var(--bg-white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            padding: calc(15px * var(--content-scale));
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transform-origin: top center;
            font-size: calc(19px * var(--content-scale));
            line-height: 1.3;
            color: var(--text-black);
        }

        .inner-content {
            border: calc(1.5px * var(--content-scale)) solid var(--border-color);
            padding: calc(15px * var(--content-scale)) calc(20px * var(--content-scale));
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: calc(10px * var(--content-scale));
            padding-bottom: calc(8px * var(--content-scale));
            border-bottom: calc(1.5px * var(--content-scale)) solid var(--border-color);
        }

        .header-name {
            font-size: calc(52px * var(--content-scale));
            font-weight: 900;
            color: var(--text-black);
            line-height: 1.1;
        }

        .header-subtitle {
            font-size: calc(21px * var(--content-scale));
            color: #333333;
            margin-top: calc(2px * var(--content-scale));
        }

        .header-contact {
            font-size: calc(18px * var(--content-scale));
            color: #333333;
            margin-top: calc(3px * var(--content-scale));
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: calc(4px * var(--content-scale));
        }

        .header-contact a {
            color: #0563c1;
            text-decoration: underline;
        }

        .header-contact .contact-sep {
            margin: 0 calc(6px * var(--content-scale));
            color: #666666;
        }

        .section {
            margin-bottom: calc(6px * var(--content-scale));
        }

        .section-header {
            background-color: var(--blue-header);
            color: #ffffff;
            font-weight: 700;
            padding: calc(4px * var(--content-scale)) calc(8px * var(--content-scale));
            font-size: calc(21px * var(--content-scale));
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: calc(1px * var(--content-scale)) solid var(--border-color);
        }

        .work-subheader {
            background-color: var(--blue-subheader);
            color: var(--text-black);
            font-weight: 700;
            padding: calc(3px * var(--content-scale)) calc(8px * var(--content-scale));
            font-size: calc(19px * var(--content-scale));
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: calc(10px * var(--content-scale));
            margin-bottom: calc(6px * var(--content-scale));
            border: calc(1px * var(--content-scale)) solid var(--border-color);
        }

        .work-subheader span:last-child {
            white-space: nowrap;
        }

        .summary-text {
            font-size: calc(19px * var(--content-scale));
            text-align: justify;
            line-height: 1.35;
        }

        .category-text {
            font-size: calc(18px * var(--content-scale));
            font-style: italic;
            margin-top: calc(-2px * var(--content-scale));
            margin-bottom: calc(6px * var(--content-scale));
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: calc(12px * var(--content-scale));
            margin-bottom: calc(2px * var(--content-scale));
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: calc(3px * var(--content-scale)) calc(5px * var(--content-scale));
            vertical-align: middle;
            text-align: center;
        }

        th {
            background-color: var(--blue-subheader);
            font-weight: 700;
            font-size: calc(18px * var(--content-scale));
            text-transform: uppercase;
        }

        td {
            font-size: calc(19px * var(--content-scale));
        }

        .bullet-list {
            list-style-type: disc;
            padding-left: calc(20px * var(--content-scale));
            margin: 0;
        }

        .bullet-list li {
            font-size: calc(19px * var(--content-scale));
            margin-bottom: calc(4px * var(--content-scale));
            text-align: justify;
            line-height: 1.3;
        }

        .bullet-list li:last-child {
            margin-bottom: 0;
        }

        .custom-section-injected ul,
        .universal-injected ul,
        .custom-section-injected .bullet-list,
        .universal-injected .bullet-list {
            list-style-type: disc;
            padding-left: calc(20px * var(--content-scale));
            margin: 0;
        }

        .custom-section-injected li,
        .universal-injected li {
            font-size: calc(19px * var(--content-scale));
            margin-bottom: calc(4px * var(--content-scale));
            text-align: justify;
            line-height: 1.3;
        }

        .custom-section-injected li:last-child,
        .universal-injected li:last-child {
            margin-bottom: 0;
        }

        .custom-section-injected [data-field],
        .universal-injected [data-field],
        .custom-section-injected p,
        .universal-injected p,
        .custom-section-injected div:not(.section-header):not(.work-subheader),
        .universal-injected div:not(.section-header):not(.work-subheader) {
            font-size: calc(19px * var(--content-scale));
            line-height: 1.35;
        }

        .custom-section-injected .section-header,
        .universal-injected .section-header {
            margin-bottom: 0;
        }

        .custom-section-injected ul,
        .universal-injected ul {
            margin-top: calc(4px * var(--content-scale));
        }

        .custom-section-injected .category-text,
        .universal-injected .category-text {
            font-size: calc(18px * var(--content-scale));
            font-style: italic;
            margin-top: calc(-2px * var(--content-scale));
            margin-bottom: calc(6px * var(--content-scale));
        }

        .template {
            display: none !important;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            html,
            body {
                width: 210mm;
                height: 297mm;
                margin: 0 !important;
                padding: 0 !important;
                overflow: hidden !important;
                background: #ffffff !important;
            }

            #zoom-wrapper {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                transform: none !important;
            }

            .cv-page {
                width: 1000px !important;
                margin: 0 auto !important;
                box-shadow: none !important;
                zoom: 0.7937;
                -moz-transform: scale(0.7937);
                -moz-transform-origin: top center;
                transform: none !important;
                position: static !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
            }

            .inner-content {
                border: 1.5px solid var(--border-color) !important;
            }
        }
    </style>
</head>
<body>
    <div id="zoom-wrapper">
        <div class="cv-page" id="cv-page">
            <div class="inner-content">
                <div class="header">
                    <div class="header-name" data-field="name"></div>
                    <div class="header-subtitle" data-field="tagline"></div>
                    <div class="header-contact" data-field="contact"></div>
                </div>

                <div class="section sortable-section" data-section-id="summary">
                    <div class="section-header">Professional Summary</div>
                    <p class="summary-text" data-field="summary"></p>
                </div>

                <div class="section sortable-section" data-section-id="experience">
                    <div class="section-header">Work Experience</div>
                    <div id="experience-list">
                        <div class="template">
                            <div class="work-subheader">
                                <span><span data-field="role"></span> | <span data-field="company"></span></span>
                                <span data-field="dates"></span>
                            </div>
                            <div class="category-text" data-field="category"></div>
                            <ul class="bullet-list" data-list="bullets"></ul>
                        </div>
                    </div>
                </div>

                <div class="section sortable-section" data-section-id="education">
                    <div class="section-header">Educational Qualification</div>
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 18%;">Course</th>
                                <th style="width: 8%;">Year</th>
                                <th style="width: 30%;">Institution</th>
                                <th style="width: 18%;">Score</th>
                                <th style="width: 26%;">Remark</th>
                            </tr>
                        </thead>
                        <tbody id="education-list">
                            <tr class="template">
                                <td data-field="degree"></td>
                                <td data-field="year"></td>
                                <td data-field="institution"></td>
                                <td data-field="marks"></td>
                                <td data-field="remarks"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="section sortable-section" data-section-id="certifications">
                    <div class="section-header">Certification &amp; Courses</div>
                    <ul class="bullet-list" data-list="certifications"></ul>
                </div>

                <div class="section sortable-section" data-section-id="projects">
                    <div class="section-header">Projects</div>
                    <div id="projects-list">
                        <div class="template">
                            <div class="work-subheader">
                                <span data-field="title"></span>
                            </div>
                            <div class="category-text" data-field="description"></div>
                            <ul class="bullet-list" data-list="bullets"></ul>
                        </div>
                    </div>
                </div>

                <div class="section sortable-section" data-section-id="achievements">
                    <div class="section-header">Achievements &amp; Extra-Curricular Activities</div>
                    <ul class="bullet-list" data-list="achievements"></ul>
                </div>

                <div class="section sortable-section" data-section-id="leadership">
                    <div class="section-header">Leadership</div>
                    <ul class="bullet-list" data-list="leadership"></ul>
                </div>

                <div class="section sortable-section" data-section-id="interests">
                    <div class="section-header">Interests</div>
                    <ul class="bullet-list" data-list="interests"></ul>
                </div>

                <div class="section sortable-section" data-section-id="skills">
                    <div class="section-header">Technical &amp; Soft Skills</div>
                    <div class="summary-text" data-field="skills"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="cv-common.js"></script>
    <script>
        function scaleToFit() {
            const page = document.getElementById('cv-page');
            if (!page || document.body.classList.contains('print-mode')) return;

            const windowWidth = window.innerWidth;
            const targetWidth = windowWidth - 20;
            const refWidth = 1000;

            let scale = 1;
            if (targetWidth < refWidth) {
                scale = targetWidth / refWidth;
            }

            page.style.transform = `scale(${scale})`;

            const refHeight = 1414;
            const currentVisualHeight = refHeight * scale;
            const spaceToRemove = refHeight - currentVisualHeight;
            page.style.marginBottom = `-${spaceToRemove}px`;
        }

        function shrinkContentToFit() {
            const page = document.getElementById('cv-page');
            const maxHeight = 1414;

            let contentScale = 1;
            document.documentElement.style.setProperty('--content-scale', contentScale);

            let iterations = 0;
            while (page.scrollHeight > maxHeight && iterations < 50) {
                contentScale -= 0.02;
                document.documentElement.style.setProperty('--content-scale', contentScale);
                iterations++;
            }
        }

        let screenTransform = '';
        let screenMarginBottom = '';

        function enablePrintMode() {
            const page = document.getElementById('cv-page');
            screenTransform = page.style.transform;
            screenMarginBottom = page.style.marginBottom;
            document.body.classList.add('print-mode');

            page.style.transform = 'scale(1)';
            page.style.marginBottom = '0px';

            shrinkContentToFit();
        }

        function handlePrintChange(e) {
            if (e.matches) {
                enablePrintMode();
            } else {
                disablePrintMode();
            }
        }

        function disablePrintMode() {
            const page = document.getElementById('cv-page');
            document.body.classList.remove('print-mode');

            page.style.transform = screenTransform || '';
            page.style.marginBottom = screenMarginBottom || '';

            scaleToFit();
        }

        function init() {
            shrinkContentToFit();
            scaleToFit();
            document.body.style.opacity = '1';

            const printMedia = window.matchMedia('print');
            if (printMedia.addEventListener) {
                printMedia.addEventListener('change', handlePrintChange);
            } else if (printMedia.addListener) {
                printMedia.addListener(handlePrintChange);
            }

            window.addEventListener('beforeprint', enablePrintMode);
            window.addEventListener('afterprint', disablePrintMode);
        }

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('load', function() {
            scaleToFit();
            shrinkContentToFit();
        });

        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(scaleToFit, 100);
        });
    </script>
</body>
</html>
