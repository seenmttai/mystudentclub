<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Reader | My Student Club</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Pre-fetch the PDF binary while the page is loading
        (function() {
            var params = new URLSearchParams(window.location.search);
            var pdfUrl = params.get('pdf');
            var resolvedUrl = pdfUrl ? pdfUrl : 'https://www.mystudentclub.com/assets/doc.pdf';
            window.__pdfPreFetch = fetch(resolvedUrl)
                .then(function(r) { return r.arrayBuffer(); })
                .catch(function() { return null; });
        })();
    </script>
</head>
<body>
    <div id="pdf-app">
        <!-- Top Toolbar -->
        <div id="toolbar">
            <div class="toolbar-left">
                <a href="https://mystudentclub.com" class="toolbar-logo" title="My Student Club">
                    <img src="https://www.mystudentclub.com/assets/logo.png" alt="My Student Club">
                </a>
                <div class="toolbar-separator"></div>
                <button id="sidebar-toggle" class="toolbar-btn" title="Toggle Pages Panel">
                    <i class="fas fa-th-list"></i>
                </button>
                <div class="toolbar-separator"></div>
                <button id="prev-page" class="toolbar-btn" title="Previous Page">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="page-indicator">
                    <input type="number" id="page-input" min="1" value="1">
                    <span class="page-sep">/</span>
                    <span id="page-count">0</span>
                </div>
                <button id="next-page" class="toolbar-btn" title="Next Page">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <div class="toolbar-center">
                <div class="search-bar">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search in document...">
                    <button id="search-prev" class="toolbar-btn-sm" title="Previous Match" disabled><i class="fas fa-chevron-up"></i></button>
                    <button id="search-next" class="toolbar-btn-sm" title="Next Match" disabled><i class="fas fa-chevron-down"></i></button>
                    <span id="search-info" class="search-info-badge"></span>
                </div>
            </div>

            <div class="toolbar-right">
                <button id="zoom-out" class="toolbar-btn" title="Zoom Out">
                    <i class="fas fa-minus"></i>
                </button>
                <span id="zoom-level" class="zoom-display">100%</span>
                <button id="zoom-in" class="toolbar-btn" title="Zoom In">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="toolbar-separator"></div>
                <button id="view-single" class="toolbar-btn active" title="Single Page">
                    <i class="fas fa-file"></i>
                </button>
                <button id="view-dual" class="toolbar-btn" title="Two Pages">
                    <i class="fas fa-columns"></i>
                </button>
                <div class="toolbar-separator"></div>
                <button id="fit-page-btn" class="toolbar-btn active" title="Fit Page">
                    <i class="fas fa-expand"></i>
                </button>
                <button id="fit-width-btn" class="toolbar-btn" title="Fit Width">
                    <i class="fas fa-arrows-alt-h"></i>
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div id="main-content">
            <!-- Thumbnail Sidebar -->
            <div id="sidebar" class="sidebar-hidden">
                <div id="thumbnail-list"></div>
            </div>

            <!-- PDF Flipbook Area -->
            <div id="viewer-area">
                <div id="loading-overlay">
                    <div class="loader-ring">
                        <div></div><div></div><div></div><div></div>
                    </div>
                    <p class="loader-text">Loading document...</p>
                </div>
                <div id="flipbook"></div>
            </div>
        </div>
    </div>

    <!-- jQuery (required by turn.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- turn.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    </script>
    <script src="script.js"></script>
</body>
</html>
