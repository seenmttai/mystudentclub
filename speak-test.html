<!DOCTYPE html>
<html>

<head>
    <title>Whisper + Gemma 4 Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.27/dist/bundle.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            gap: 40px;
            padding: 20px;
        }

        .column {
            flex: 1;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        #chat-log {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            margin-bottom: 10px;
        }

        .msg {
            margin-bottom: 15px;
        }

        .user {
            color: blue;
        }

        .ai {
            color: green;
        }

        .thumbnail {
            max-width: 150px;
            border-radius: 4px;
            display: block;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- LEFT COLUMN: Whisper -->
    <div class="column">
        <h2>Speech to Text (Whisper)</h2>
        <button id="start-btn">Start Microphone</button>
        <p id="status">Status: Waiting</p>
        <div id="transcription" style="white-space: pre-wrap; margin-top: 10px;"></div>
    </div>

    <!-- RIGHT COLUMN: Gemma 4 Chat & Vision -->
    <div class="column">
        <h2>Chat & Vision with Gemma 4</h2>
        <div id="chat-log"></div>

        <!-- Image Preview Area -->
        <div id="image-preview-container" style="display:none; margin-bottom:10px;">
            <img id="image-preview" class="thumbnail" />
            <button onclick="clearImage()">Remove Image</button>
        </div>

        <div class="controls">
            <input type="file" id="image-upload" accept="image/*" />
            <input type="text" id="chat-input" placeholder="Type message or ask about image..."
                style="flex:1; padding: 8px;" />
            <button id="send-btn" style="padding: 8px;">Send</button>
        </div>
    </div>

    <script>
        const workerBaseUrl = "https://whisper.bhansalimanan55.workers.dev"; // Replace with your Worker URL

        let currentImageBase64 = null;
        let currentImageType = null;

        // --- Image Handling ---
        document.getElementById('image-upload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            currentImageType = file.type;
            const reader = new FileReader();
            reader.onload = function (event) {
                // We only want the base64 string, without the "data:image/jpeg;base64," prefix for the API
                const base64String = event.target.result.split(',')[1];
                currentImageBase64 = base64String;

                // Show preview
                document.getElementById('image-preview').src = event.target.result;
                document.getElementById('image-preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        function clearImage() {
            currentImageBase64 = null;
            currentImageType = null;
            document.getElementById('image-upload').value = "";
            document.getElementById('image-preview-container').style.display = 'none';
        }

        // --- Whisper Voice Transcription Logic ---
        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('status').innerText = "Status: Loading VAD model...";

            const myvad = await vad.MicVAD.new({
                onSpeechStart: () => {
                    document.getElementById('status').innerText = "Status: Listening...";
                },
                onSpeechEnd: async (audio) => {
                    document.getElementById('status').innerText = "Status: Processing Audio...";
                    const wavBuffer = vad.utils.encodeWAV(audio);

                    try {
                        const response = await fetch(`${workerBaseUrl}/whisper`, {
                            method: 'POST',
                            body: wavBuffer,
                            headers: { 'Content-Type': 'audio/wav' }
                        });

                        const result = await response.json();
                        const text = result.text.trim();

                        document.getElementById('transcription').innerText += "\n" + text;
                        document.getElementById('status').innerText = "Status: Waiting for speech...";
                        document.getElementById('chat-input').value = text;

                    } catch (err) {
                        console.error(err);
                        document.getElementById('status').innerText = "Status: Error";
                    }
                },
                onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
                baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.27/dist/",
            });

            myvad.start();
            document.getElementById('status').innerText = "Status: VAD started. Waiting for speech...";
        };

        // --- Gemma 4 Chat Logic ---
        let conversationHistory = [
            { role: "system", content: "You are a helpful AI assistant." }
        ];

        document.getElementById('send-btn').onclick = async () => {
            const inputEl = document.getElementById('chat-input');
            const userText = inputEl.value.trim();

            if (!userText && !currentImageBase64) return;

            // Display user message in UI
            let uiHtml = userText;
            if (currentImageBase64) {
                uiHtml += `<br><img src="data:${currentImageType};base64,${currentImageBase64}" class="thumbnail">`;
            }
            addMessageToUI("User", uiHtml, "user");

            // Construct the message format
            // If there's an image, the content is an array. Otherwise, it's a standard string.
            let messageContent;
            if (currentImageBase64) {
                messageContent = [
                    { type: "text", text: userText || "Describe this image." },
                    { type: "image_url", image_url: { url: `data:${currentImageType};base64,${currentImageBase64}` } }
                ];
            } else {
                messageContent = userText;
            }

            conversationHistory.push({ role: "user", content: messageContent });

            // Clear inputs
            inputEl.value = "";
            clearImage();

            try {
                const response = await fetch(`${workerBaseUrl}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const result = await response.json();
                const aiText = result.response;

                addMessageToUI("Gemma 4", aiText, "ai");
                conversationHistory.push({ role: "assistant", content: aiText });

            } catch (err) {
                console.error(err);
                addMessageToUI("System", "Error communicating with Gemma 4", "error");
            }
        };

        function addMessageToUI(sender, htmlContent, className) {
            const log = document.getElementById('chat-log');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${className}`;
            msgDiv.innerHTML = `<strong>${sender}:</strong><br>${htmlContent}`;
            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>

</html>
